[package]
name = "elo_cairo_verifier"
version = "0.4.0"
edition = "2024_07"

# Generic on-chain sumcheck verifier for ML matrix multiplication.
# No token or payment dependencies — pure cryptographic verification.
# Compatible with any Starknet dapp that needs to verify STWO ML proofs.

[features]
default = ["poseidon252_verifier", "skip_merkle"]
poseidon252_verifier = ["stwo_verifier_core/poseidon252_verifier", "stwo_cairo_air/poseidon252_verifier"]
skip_merkle = ["stwo_verifier_core/skip_merkle"]
# General-purpose STWO verification features
general_stwo = ["stwo_cairo_air/qm31_opcode"]
general_stwo_poseidon = ["stwo_cairo_air/poseidon252_verifier", "stwo_cairo_air/poseidon_outputs_packing"]

[dependencies]
starknet = "2.12.0"
stwo_verifier_core = { path = "../stark-cairo/stwo_cairo_verifier/crates/verifier_core" }
stwo_constraint_framework = { path = "../stark-cairo/stwo_cairo_verifier/crates/constraint_framework" }
stwo_verifier_utils = { path = "../stark-cairo/stwo_cairo_verifier/crates/verifier_utils" }
stwo_cairo_air = { path = "../stark-cairo/stwo_cairo_verifier/crates/cairo_air" }
bounded_int = { path = "../stark-cairo/stwo_cairo_verifier/crates/bounded_int" }

[dev-dependencies]
snforge_std = { git = "https://github.com/foundry-rs/starknet-foundry", tag = "v0.54.1" }
cairo_test = "2.12.2"

[[target.starknet-contract]]
casm = true
allowed-libfuncs-list.name = "all"

[tool.snforge]
name = "elo_cairo_verifier"
